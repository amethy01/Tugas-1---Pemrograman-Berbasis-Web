<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amethy Comic Store</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <header class="header">
      <div class="container header-content">
        <div class="brand">
          <a class="brand" href="index.html">
            <img src="assets/img/logo.png" alt="logo" class="brand-logo" />
          </a>
          <h1 class="logo">Amethy Comic Store</h1>
        </div>

        <nav class="navbar" aria-label="Navigasi utama">
          <a href="#katalog">Katalog</a>
          <a href="#keranjang">Keranjang</a>
          <a href="#checkout">Checkout</a>
        </nav>

        <button id="themeBtn" class="btn theme-btn">🌙 Dark Mode</button>
      </div>
    </header>

    <main>
      <!-- HERO -->
      <section class="hero">
        <div class="container">
          <h2>Toko Komik Online Terlengkap!</h2>
          <p>Kobarkan Semangat Membacamu, Lampaui Batas Koleksimu!</p>
        </div>
      </section>

      <!-- KATALOG -->
      <section id="katalog" class="section">
        <div class="container">
          <h2 class="section-title">📚 Katalog Komik</h2>

          <div class="filter-area">
            <input
              type="text"
              id="searchInput"
              placeholder="Cari judul komik..."
            />

            <select id="categoryFilter">
              <option value="all">Semua Kategori</option>
              <option value="Action">Action</option>
              <option value="Comedy">Comedy</option>
              <option value="Drama">Drama</option>
              <option value="Sport">Sport</option>
            </select>

            <select id="sortFilter">
              <option value="default">Urutkan</option>
              <option value="cheap">Termurah</option>
              <option value="expensive">Termahal</option>
              <option value="az">A-Z</option>
              <option value="za">Z-A</option>
            </select>
          </div>

          <div id="comicList" class="grid"></div>
        </div>
      </section>

      <!-- KERANJANG -->
      <section id="keranjang" class="section cart-section">
        <div class="container">
          <h2 class="section-title">🛒 Keranjang Belanja</h2>

          <div id="cartList" class="cart-list"></div>

          <div class="cart-summary">
            <p><strong>Total Item:</strong> <span id="totalItems">0</span></p>
            <p>
              <strong>Total Harga:</strong> Rp <span id="totalPrice">0</span>
            </p>
            <button id="clearCartBtn" class="btn danger-btn">
              Hapus Keranjang
            </button>
          </div>
        </div>
      </section>

      <!-- CHECKOUT -->
      <section id="checkout" class="section checkout-section">
        <div class="container">
          <h2 class="section-title">🧾 Checkout</h2>

          <form id="checkoutForm" class="checkout-form">
            <div class="form-group">
              <label for="nama">Nama Lengkap</label>
              <input
                type="text"
                id="nama"
                placeholder="Masukkan nama..."
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                placeholder="contoh@email.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="alamat">Alamat</label>
              <textarea
                id="alamat"
                placeholder="Masukkan alamat lengkap..."
                required
              ></textarea>
            </div>

            <div class="form-group">
              <label for="pembayaran">Metode Pembayaran</label>
              <select id="pembayaran" required>
                <option value="">-- Pilih Metode --</option>
                <option value="Transfer Bank">Transfer Bank</option>
                <option value="E-Wallet">E-Wallet</option>
                <option value="COD">COD</option>
              </select>
            </div>

            <button type="submit" class="btn success-btn">
              Bayar Sekarang
            </button>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2026 Amethy Comic Store - Ricky Dian Fitrianto.</p>
      </div>
    </footer>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
